<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Logout</title>
  <link rel="stylesheet" href="logout.css">
</head>
<body>
  <main class="logout-center">
    <div class="logout-card">
      <h1>Are you sure you want to logout?</h1>
      <p class="muted">You will remain able to recover your account and your data will not be deleted.</p>
      <div class="actions">
        <button id="cancelBtn" class="btn secondary">Cancel</button>
        <button id="confirmBtn" class="btn primary">Yes, logout</button>
      </div>
    </div>
  </main>
  <script src="logout.js"></script>
</body>
</html>
