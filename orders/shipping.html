<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Details | Byose Market Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="checkout.css">
</head>
<body>
  <div class="orders-shell orders-shell--compact orders-shell--shipping">
    <main class="orders-layout">
      <section class="orders-main">
        <div class="orders-progress" id="checkoutProgress"></div>

        <article class="orders-panel">
          <header class="orders-panel-head">
            <p>Step 1</p>
            <h2>Shipping location</h2>
            <p>Capture the Rwanda delivery address and GPS location, then continue to the order review page.</p>
          </header>

          <div class="orders-step-message" id="shippingMessage" hidden></div>

          <form id="shippingForm" class="orders-step-stack" novalidate>
            <div class="orders-form-grid">
              <label class="orders-field orders-field--full">
                <span class="orders-field-label">Amazina / Full Name <strong>*</strong></span>
                <input type="text" name="fullName" autocomplete="name" placeholder="Customer full name">
              </label>
              <label class="orders-field">
                <span class="orders-field-label">Telefoni / Phone Number <strong>*</strong></span>
                <input type="tel" name="phone" autocomplete="tel" inputmode="tel" placeholder="07XXXXXXXX">
              </label>
              <label class="orders-field">
                <span class="orders-field-label">Intara cyangwa Umujyi / Province or City <strong>*</strong></span>
                <input type="text" name="provinceCity" autocomplete="address-level1" placeholder="Kigali City">
              </label>
              <label class="orders-field">
                <span class="orders-field-label">Akarere / District <strong>*</strong></span>
                <input type="text" name="district" autocomplete="address-level1" placeholder="Gasabo">
              </label>
              <label class="orders-field">
                <span class="orders-field-label">Umurenge / Sector <strong>*</strong></span>
                <input type="text" name="sector" autocomplete="address-level3" placeholder="Kimironko">
              </label>
              <label class="orders-field">
                <span class="orders-field-label">Akagari / Cell <strong>*</strong></span>
                <input type="text" name="cell" autocomplete="off" placeholder="Bibare">
              </label>
              <label class="orders-field">
                <span class="orders-field-label">Umudugudu / Village <strong>*</strong></span>
                <input type="text" name="village" autocomplete="off" placeholder="Village name">
              </label>
              <label class="orders-field orders-field--full">
                <span class="orders-field-label">Umuhanda cyangwa Ikimenyetso / Street or Landmark <strong>*</strong></span>
                <input type="text" name="street" autocomplete="street-address" placeholder="Street, building, or landmark">
              </label>
              <label class="orders-field orders-field--full">
                <span class="orders-field-label">Ibisobanuro by’inyongera / Optional Note</span>
                <textarea name="note" rows="4" placeholder="Delivery note, nearby landmark, or contact instruction"></textarea>
              </label>
            </div>

            <section class="orders-location-card" aria-live="polite">
              <div class="orders-location-copy">
                <span class="orders-sidebar-label">GPS location</span>
                <h3>Capture device location</h3>
                <p id="locationStatus">We will ask for permission and store a Google Maps link with the order.</p>
                <div class="orders-location-meta" id="locationMeta"></div>
                <a class="orders-map-link" id="locationMapLink" href="#" target="_blank" rel="noreferrer noopener" hidden>Open Google Maps</a>
              </div>
              <div class="orders-location-actions">
                <button type="button" class="orders-link-button" id="detectLocationBtn">Use Current Location</button>
                <button type="button" class="orders-back-button" id="refreshLocationBtn">Refresh GPS</button>
              </div>
            </section>

            <div class="orders-step-actions">
              <a class="orders-back-button" href="../cart.html">Back</a>
              <button type="submit" class="orders-next-button">Continue to Checkout</button>
            </div>
          </form>
        </article>
      </section>

      <aside class="orders-sidebar" id="checkoutSidebar"></aside>
    </main>
  </div>

  <script src="../services/authservice.js"></script>
  <script type="module" src="shipping.js"></script>
</body>
</html>
