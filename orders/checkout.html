<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Review | Byose Market Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="checkout.css">
</head>
<body>
  <div class="orders-shell orders-shell--compact orders-shell--stage">
    <main class="orders-layout">
      <section class="orders-main">
        <div class="orders-progress" id="checkoutProgress"></div>

        <article class="orders-panel">
          <header class="orders-panel-head orders-panel-head--stage">
            <p>Step 2</p>
            <h2>Checkout review</h2>
            <p>Review the shipping details and order items before moving to payment.</p>
          </header>

          <div class="orders-step-message" id="checkoutMessage" hidden></div>
          <div id="checkoutContent"></div>
        </article>
      </section>

      <aside class="orders-sidebar" id="checkoutSidebar"></aside>
    </main>
  </div>

  <script src="../services/authservice.js"></script>
  <script type="module" src="checkout.js"></script>
</body>
</html>
