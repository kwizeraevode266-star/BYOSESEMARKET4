<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details | Byose Market</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f8fb; color: #132033; }
    main { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 12px 32px rgba(19, 32, 51, 0.08); }
    a { color: #1f5eff; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Order Details</h1>
      <p id="orderId">Order reference: pending</p>
      <p>This route is available for notifications and deep links on GitHub Pages.</p>
      <p><a href="account.html">Back to account</a></p>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    if (orderId) {
      document.getElementById('orderId').textContent = 'Order reference: #' + orderId;
    }
  </script>
</body>
</html>
