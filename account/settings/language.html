<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Language — ByoseMarket</title>

  <!-- Poppins font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- FontAwesome for optional icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root{
      --bg: #f7f8fb;
      --card: rgba(255,255,255,0.75);
      --muted: #6b7280;
      --accent: #0b84ff;
      --radius: 12px;
      --shadow: 0 6px 18px rgba(12,20,40,0.06);
      --glass: rgba(255,255,255,0.55);
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background: linear-gradient(180deg, #f4f6fb 0%, var(--bg) 100%);
      color:#111827;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      -webkit-touch-callout:none;
    }

    /* Sticky header */
    .header{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter: blur(6px);
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.6));
      border-bottom: 1px solid rgba(15,23,42,0.04);
      padding:12px 16px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .back-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;height:40px;
      border-radius:10px;
      background:transparent;
      border:none;
      color:var(--accent);
      font-size:18px;
    }
    .title{font-weight:600;font-size:16px}

    .container{
      padding:18px;
      max-width:720px;
      margin:12px auto;
    }

    /* Language list */
    #languageList{list-style:none;padding:0;margin:0;display:grid;gap:12px}
    .language-item{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:14px;border-radius:12px;
      background:var(--card);
      box-shadow:var(--shadow);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, border-color .12s ease;
      border:1px solid rgba(15,23,42,0.03);
      cursor:pointer;touch-action: manipulation;
    }
    .language-item:active{transform:translateY(1px)}
    .language-left{display:flex;align-items:center;gap:12px}
    .flag{font-size:20px}
    .lang-name{font-weight:500}
    .lang-sub{font-size:12px;color:var(--muted)}

    .language-item .check{
      font-size:18px;color:transparent;opacity:0;transition:color .12s ease, opacity .12s ease, transform .12s ease;
      transform:scale(.9);
    }
    .language-item.selected{
      background:linear-gradient(180deg, rgba(11,132,255,0.08), rgba(11,132,255,0.04));
      border-color: rgba(11,132,255,0.12);
    }
    .language-item.selected .check{color:var(--accent);opacity:1;transform:scale(1)}

    /* Current language footer */
    .current-row{margin-top:18px;font-size:14px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
    .current-row strong{color:#111827}

    /* Responsive spacing */
    @media(min-width:700px){
      .container{padding:24px}
    }
  </style>

</head>
<body>

  <!-- HEADER -->
  <header class="header" role="banner">
    <a class="back-btn" href="../settings.html" aria-label="Back to settings">←</a>
    <div class="title">Language</div>
  </header>

  <main class="container" role="main">

    <!-- Short intro / instruction -->
    <p style="margin:0 0 12px 0;color:var(--muted);font-size:14px">Select your preferred language for ByoseMarket.</p>

    <!-- LANGUAGE LIST -->
    <ul id="languageList" role="list" aria-label="Available languages">
      <!-- Each item uses data-lang and the class .language-item. JS will toggle .selected. -->
      <li class="language-item" data-lang="rw" role="button" tabindex="0" aria-pressed="false">
        <div class="language-left">
          <div class="flag" aria-hidden="true">🇷🇼</div>
          <div>
            <div class="lang-name">Kinyarwanda</div>
            <div class="lang-sub">Ikinyarwanda</div>
          </div>
        </div>
        <div class="check" aria-hidden="true"><i class="fa-solid fa-check"></i></div>
      </li>

      <li class="language-item" data-lang="en" role="button" tabindex="0" aria-pressed="false">
        <div class="language-left">
          <div class="flag" aria-hidden="true">🇬🇧</div>
          <div>
            <div class="lang-name">English</div>
            <div class="lang-sub">English</div>
          </div>
        </div>
        <div class="check" aria-hidden="true"><i class="fa-solid fa-check"></i></div>
      </li>

      <li class="language-item" data-lang="fr" role="button" tabindex="0" aria-pressed="false">
        <div class="language-left">
          <div class="flag" aria-hidden="true">🇫🇷</div>
          <div>
            <div class="lang-name">Français</div>
            <div class="lang-sub">Français</div>
          </div>
        </div>
        <div class="check" aria-hidden="true"><i class="fa-solid fa-check"></i></div>
      </li>
    </ul>

    <!-- CURRENT LANGUAGE DISPLAY -->
    <div class="current-row" aria-live="polite">
      <div>Current language:</div>
      <!-- Placeholder for dynamic value; integration scripts should replace {{current_language}} -->
      <div><strong id="currentLanguage">{{current_language}}</strong></div>
    </div>

  </main>

  <!-- Integration notes:
       - This file is prepared to integrate with /language.js and /storage.js.
       - The inline script below is a lightweight helper to make the UI interactive and localStorage-ready.
       - You may remove the inline handler and import your centralized language/storage modules instead.
  -->

  <!-- Optional integration scripts (uncomment when available):
  <script src="../../language.js" defer></script>
  <script src="../../storage.js" defer></script>
  -->

  <script>
    // Lightweight UI logic: highlights selection and saves to localStorage.
    (function(){
      const LIST_ID = 'languageList';
      const STORAGE_KEY = 'byose_language';
      const list = document.getElementById('languageList');
      const items = Array.from(list.querySelectorAll('.language-item'));
      const currentLabel = document.getElementById('currentLanguage');

      function setSelected(lang, persist = true){
        items.forEach(it => {
          const is = it.dataset.lang === lang;
          it.classList.toggle('selected', is);
          it.setAttribute('aria-pressed', is? 'true':'false');
        });
        // Update visible label
        currentLabel.textContent = (lang === 'rw') ? 'Kinyarwanda' : (lang === 'fr' ? 'Français' : 'English');

        // Persist selection (localStorage-ready). If you have a custom storage module, it can override this.
        if(persist && window.localStorage){
          try{ localStorage.setItem(STORAGE_KEY, lang); }catch(e){}
        }

        // Dispatch a custom event so other modules can react (e.g., shared/language.js)
        const ev = new CustomEvent('byose:languageChanged', { detail: { lang } });
        window.dispatchEvent(ev);
      }

      // Initialize from storage or default (Kinyarwanda)
      const saved = (function(){
        try{ return localStorage.getItem(STORAGE_KEY); }catch(e){return null}
      })();
      setSelected(saved || 'rw', false);

      // Click / keyboard handlers
      items.forEach(it => {
        it.addEventListener('click', () => setSelected(it.dataset.lang, true));
        it.addEventListener('keydown', (e) => {
          if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); it.click(); }
        });
      });

      // Expose small helper for integration: window.ByoseLanguage.set(lang)
      window.ByoseLanguage = window.ByoseLanguage || {};
      window.ByoseLanguage.set = function(lang){ setSelected(lang, true); };
      window.ByoseLanguage.get = function(){ return (localStorage.getItem(STORAGE_KEY) || 'rw'); };

    })();
  </script>

</body>
</html>
