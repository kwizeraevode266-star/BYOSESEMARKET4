<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="Shop by Categories — modern international eCommerce categories grid. Browse Shoes, Bags, Electronics and more." />
	<title>Shop by Categories</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="categories.css">
</head>
<body class="page-categories">
	<header class="site-header">
		<div class="container header-row">
			<div class="brand"> 
				<a href="index.html" class="brand-link">MyShop</a>
			</div>
			<div class="header-actions">
				<nav class="breadcrumb" aria-label="Breadcrumb">
					<ol>
						<li><a href="index.html">Home</a></li>
						<li aria-current="page">Categories</li>
					</ol>
				</nav>
			</div>
		</div>
		<div class="page-hero">
			<div class="container">
				<h1 class="page-title">Shop by Categories</h1>
				<p class="page-sub">Discover thousands of products across curated categories.</p>
				<div class="search-wrap">
					<label for="categorySearch" class="visually-hidden">Search categories</label>
					<input id="categorySearch" type="search" placeholder="Search categories e.g. Shoes, Electronics" aria-label="Search categories" />
				</div>
			</div>
		</div>
	</header>

	<main class="container main">
		<section class="categories-section" aria-labelledby="categories-heading">
			<h2 id="categories-heading" class="sr-only">Categories</h2>

			<div id="categoriesGrid" class="categories-grid" aria-live="polite">
				<!-- Cards injected by categories.js for scalability and future dynamic loading -->
			</div>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container footer-inner">
			<div class="footer-col">© <span id="year"></span> MyShop — All rights reserved.</div>
			<div class="footer-col">Quick links: <a href="shop.html">Shop</a> · <a href="contact.html">Contact</a></div>
		</div>
	</footer>

	<noscript>
		<style>
			.categories-grid { display:block }
		</style>
		<div class="container">JavaScript is required to view categories. Please enable JavaScript.</div>
	</noscript>

	<script src="categories.js" defer></script>
</body>
</html>
