<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details | Byose Market Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/pages/orders.css">
</head>
<body class="admin-dashboard-page">
  <div class="dashboard-shell">
    <div class="dashboard-orb dashboard-orb-primary" aria-hidden="true"></div>
    <div class="dashboard-orb dashboard-orb-secondary" aria-hidden="true"></div>
    <div class="admin-app-shell">
      <div class="admin-sidebar-backdrop" data-sidebar-backdrop hidden></div>
      <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin navigation" data-sidebar-root></aside>
      <div class="admin-main-shell">
        <header class="admin-topbar dashboard-panel">
          <div class="admin-topbar-leading">
            <button class="sidebar-toggle-button" type="button" aria-label="Open navigation" aria-controls="adminSidebar" aria-expanded="false" data-sidebar-toggle>
              <span></span>
              <span></span>
              <span></span>
            </button>
            <div>
              <p class="dashboard-eyebrow">Admin Orders</p>
              <h1 class="admin-topbar-title">Order Details</h1>
            </div>
          </div>
          <div class="admin-topbar-meta">
            <span class="admin-status-dot"></span>
            <span>Customer, payment, delivery, and product summary</span>
          </div>
        </header>

        <main class="dashboard-grid orders-page-grid">
          <section class="dashboard-panel orders-detail-hero" id="orderDetailsHero">
            <p class="dashboard-eyebrow">Order Details</p>
            <h2>Loading order...</h2>
            <p>Fetching the latest checkout record.</p>
          </section>

          <section class="orders-detail-stack" id="orderDetailsGrid" hidden>
            <article class="dashboard-panel orders-detail-actions">
              <div class="orders-panel-headline">
                <p class="dashboard-eyebrow">Controls</p>
                <h3>Manage order</h3>
              </div>
              <div class="orders-detail-controls">
                <label class="orders-inline-status orders-inline-status--wide">
                  <span>Status</span>
                  <select id="orderStatusSelect"></select>
                </label>
                <button type="button" class="orders-danger-button" id="deleteOrderButton">Delete order</button>
                <a class="orders-secondary-link" href="index.html">Back to orders</a>
              </div>
              <p class="orders-status-message" id="orderDetailsStatusMessage">Current status: Pending</p>
            </article>

            <section class="orders-detail-grid">
              <article class="dashboard-panel orders-detail-card" id="orderCustomerPanel"></article>
              <article class="dashboard-panel orders-detail-card" id="orderPaymentPanel"></article>
              <article class="dashboard-panel orders-detail-card" id="orderSummaryPanel"></article>
            </section>

            <section class="dashboard-panel orders-products-panel">
              <div class="orders-panel-headline">
                <p class="dashboard-eyebrow">Products</p>
                <h3>Items in this order</h3>
              </div>
              <div class="orders-products-list" id="orderProductsList">
                <div class="orders-empty-state">Loading products...</div>
              </div>
            </section>
          </section>
        </main>
      </div>
    </div>
  </div>
  <script src="../js/services/catalog.service.js"></script>
  <script src="../../js/products.js"></script>
  <script src="../js/services/orders.service.js"></script>
  <script src="../js/components/sidebar.js"></script>
  <script src="../js/pages/order-details.page.js"></script>
</body>
</html>
