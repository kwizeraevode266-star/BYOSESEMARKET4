<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Preview | Byose Market Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
</head>
<body>
  <div class="dashboard-shell">
    <div class="dashboard-orb dashboard-orb-primary" aria-hidden="true"></div>
    <div class="dashboard-orb dashboard-orb-secondary" aria-hidden="true"></div>
    <div class="admin-app-shell">
      <div class="admin-sidebar-backdrop" data-sidebar-backdrop hidden></div>
      <aside class="admin-sidebar" id="adminSidebar" aria-label="Admin navigation" data-sidebar-root></aside>
      <div class="admin-main-shell">
        <header class="admin-topbar dashboard-panel">
          <div class="admin-topbar-leading">
            <button class="sidebar-toggle-button" type="button" aria-label="Open navigation" aria-controls="adminSidebar" aria-expanded="false" data-sidebar-toggle>
              <span></span><span></span><span></span>
            </button>
            <div>
              <p class="dashboard-eyebrow">Sidebar Preview</p>
              <h1 class="admin-topbar-title">Admin Navigation Component</h1>
            </div>
          </div>
          <div class="admin-topbar-meta"><span class="admin-status-dot"></span><span>Shared navigation preview for the full admin system</span></div>
        </header>
        <main class="dashboard-grid module-dashboard-grid">
          <section class="dashboard-panel module-hero-panel">
            <div class="module-hero-copy">
              <p class="dashboard-eyebrow">Shared Component</p>
              <h2>Live sidebar structure</h2>
              <p>This preview mounts the same sidebar script used across dashboard, catalog, orders, customers, messages, reviews, homepage, media, and settings pages.</p>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>
  <script src="../js/components/sidebar.js"></script>
</body>
</html>
