<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details - Byose Market</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="product-details2.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>


<body>


<!-- HEADER -->

<header class="main-header">
  <div class="header-wrap">
    <div class="logo">
      <a href="index.html"><img src="img/logo.png" alt="Byose Market" /></a>
    </div>

    <nav class="nav" id="mainNav">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="header-icons">
      <a class="icon-btn" href="search.html" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
      <a class="icon-btn" href="login.html" aria-label="Account"><i class="fa-regular fa-user"></i></a>
      <button type="button" class="icon-btn" id="cartBtn" aria-label="Shopping Cart" style="border: none; background: transparent; padding: 0; width: auto; height: auto;">
        <i class="fas fa-shopping-cart" style="font-size: 20px;"></i>
        <span class="badge" id="cartBadge" role="status" aria-live="polite">0</span>
      </button>
      <div id="cart-slot"></div>
    </div>
  </div>
</header>



<!-- MAIN -->

<main class="pd-container">


<!-- PRODUCT GALLERY -->

<section class="pd-gallery">

<div class="gallery-main">

<img src="img/all products   new bolonce.jpeg" id="mainImage">

</div>


<div class="gallery-thumbs">

<img src="img/all products  1990 ajf kkf.jpeg" class="thumb active">

<img src="img/all products  adidos.jpeg" class="thumb">

<img src="img/all products   inweto r.jpeg" class="thumb">

<img src="img/all products   new bolonce.jpeg" class="thumb">

</div>

</section>



<!-- PRODUCT INFO -->

<section class="pd-info">


<h1 class="pd-title">
Nike Air Max 270
</h1>


<div class="pd-rating">

<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star-half"></i>

<span>4.5 (128 reviews)</span>

</div>



<div class="pd-price">

<h2>20000 Rwf</h2>

<del>25000 Rwf</del>

<span class="discount">
10% OFF
</span>

</div>



<p class="stock">

<i class="fa fa-check-circle"></i>
In Stock (25 available)

</p>



<!-- COLOR -->

<div class="pd-option">

<h4>Color</h4>

<div class="color-options">

<button class="color active" data-color="Black">
<span class="color-dot" style="background:black"></span>
<span>Black</span>
</button>

<button class="color" data-color="White">
<span class="color-dot" style="background:#eee;border:1px solid #ccc"></span>
<span>White</span>
</button>

<button class="color" data-color="Red">
<span class="color-dot" style="background:red"></span>
<span>Red</span>
</button>

</div>

</div>



<!-- SIZE -->

<div class="pd-option">

<h4>Size</h4>

<div class="size-options">

<button class="size">7</button>
<button class="size">8</button>
<button class="size active">9</button>
<button class="size">10</button>
<button class="size">11</button>
<button class="size">12</button>

</div>

</div>



<!-- QUANTITY -->

<div class="pd-option">

<h4>Quantity</h4>

<div class="qty-box">

<button>-</button>

<input type="number" value="1">

<button>+</button>

</div>

</div>
<div class="product-bottom">

    <div class="product-total">
      <span>Total:</span>
      <strong id="totalPrice">20000 Rwf</strong>
    </div>

  <div class="desktop-actions">
      <button class="wishlist-btn">
        <i class="fa fa-heart"></i>
      </button>

      <button class="add-cart-btn add-cart">
        <i class="fa fa-shopping-cart"></i>
        Add to Cart
      </button>

      <button class="buy-now-btn add-cart">
        ⚡ Buy Now
      </button>
  </div>

</div>


</section>




<!-- MOBILE BUTTONS -->


<div class="mobile-actions">

<button class="wishlist-btn">
<i class="fa fa-heart"></i>
</button>

<button class="add-cart-btn add-cart">
Add to Cart
</button>

<button class="buy-now-btn add-cart">
Buy Now
</button>

</div>





<!-- SELECT OPTIONS MODAL -->

<div class="select-modal" id="selectModal">

<div class="select-content">

<button class="close-modal" id="closeModal">
<i class="fa fa-times"></i>
</button>

<div class="modal-product">

<img id="modalImage" src="" />

<div>

<h3 id="modalTitle"></h3>

<p id="modalPrice">20000 Rwf</p>

</div>

</div>


<h4>Color</h4>

<div class="modal-colors" id="modalColors"></div>


<h4>Size</h4>

<div class="modal-sizes" id="modalSizes"></div>


<h4>Quantity</h4>

<div class="modal-qty">

<button id="modalMinus">-</button>

<input type="number" id="modalQty" value="1">

<button id="modalPlus">+</button>

</div>


<button class="modal-add-cart" id="confirmAddCart">
Add to Cart
</button>

</div>

</div>


<script src="cart.js" defer></script>
<script src="product-details2.js"></script>
<script src="/shared/storage.js"></script>
<script src="js/header.js"></script>


</body>
</html>
