<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link rel="stylesheet" href="auth-style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <h2 class="auth-title">Reset Password</h2>
        <p class="auth-subtitle">Enter your new password below</p>

        <!-- NEW PASSWORD -->
        <div class="form-group password-group">
            <label>New Password</label>
            <input type="password" id="newPassword" class="input" placeholder="Enter new password">
            <span class="toggle-password" id="toggleNew">👁️</span>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="form-group password-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" class="input" placeholder="Confirm password">
            <span class="toggle-password" id="toggleConfirm">👁️</span>
        </div>

        <!-- BUTTON -->
        <button id="resetBtn" class="btn-primary">
            Reset Password
        </button>

        <!-- BACK -->
        <p class="auth-footer">
            <a href="login.html">Back to Login</a>
        </p>

    </div>

</div>

<script src="reset-password.js"></script>

</body>
</html>
