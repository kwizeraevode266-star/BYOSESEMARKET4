<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Byose Market</title>
  <meta name="description" content="Browse compact fashion, shoes, electronics and daily deals on Byose Market.">
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/home-mobile.css">
  <link rel="stylesheet" href="css/home-desktop.css">
  <link rel="stylesheet" href="mobile-nav.css">
  <link rel="stylesheet" href="shop.css">
</head>
<body class="home-page shop-page">
  <header class="main-header" id="mainHeader" data-sticky-header>
    <div class="container header-shell">
      <div class="header-mobile-top">
        <a class="brand brand-mobile" href="index.html" aria-label="Byose Market Home">
          <img class="brand-logo" src="img/logo.png" alt="Byose Market logo">
        </a>
        <a href="contact.html#form-message" class="icon-btn mobile-messages-btn" aria-label="Contact support">
          <i class="fa-regular fa-comment-dots" aria-hidden="true"></i>
        </a>
      </div>

      <a class="brand header-desktop-brand" href="index.html" aria-label="Byose Market Home">
        <img class="brand-logo" src="img/logo.png" alt="Byose Market logo">
      </a>

      <nav class="header-nav nav header-desktop-nav" aria-label="Main navigation">
        <a href="index.html" class="nav-link" data-page="home">
          <i class="fa-solid fa-house" aria-hidden="true"></i>
          <span>Home</span>
        </a>
        <a href="shop.html" class="nav-link active" data-page="shop">
          <i class="fa-solid fa-store" aria-hidden="true"></i>
          <span>Shop</span>
        </a>
        <a href="contact.html" class="nav-link" data-page="contact">
          <i class="fa-regular fa-envelope" aria-hidden="true"></i>
          <span>Contact</span>
        </a>
      </nav>

      <div class="header-actions header-desktop-actions">
        <div class="header-search-hover">
          <a href="search.html" class="icon-btn header-search-toggle" aria-label="Open search page">
            <i class="fa-solid fa-magnifying-glass"></i>
          </a>
          <form class="header-search header-search-preview site-search" id="desktopSearchPreview" role="search" action="search.html">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input id="searchInput" name="q" type="search" placeholder="Search products..." aria-label="Search products">
            <button id="searchBtn" type="submit" aria-label="Submit search">
              <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
            </button>
          </form>
        </div>
        <a href="cart.html" class="icon-btn desktop-cart-btn" id="cartBtn" aria-label="Cart">
          <i class="fa-solid fa-cart-shopping"></i>
        </a>
        <a href="login.html" class="icon-btn" id="accountBtn" aria-label="Account">
          <i class="fa-regular fa-user"></i>
        </a>
      </div>

      <div class="header-search header-search-mobile-redirect" id="homeSearchRedirect" role="button" tabindex="0" aria-label="Open search page">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input id="homeSearchInput" type="search" placeholder="Search shoes..." aria-label="Search products" readonly tabindex="-1" inputmode="none">
      </div>
    </div>
  </header>

  <main class="shop-main">
    <section class="container shop-toolbar-wrap">
      <div class="shop-toolbar card-surface">
        <div class="shop-toolbar-copy">
          <span class="section-kicker">Quick filters</span>
          <h2>Find products fast</h2>
        </div>

        <div class="filters" role="tablist" aria-label="Product filters">
          <button type="button" data-filter="all" class="active" aria-pressed="true">All</button>
          <button type="button" data-filter="fashion" aria-pressed="false">Fashion</button>
          <button type="button" data-filter="shoes" aria-pressed="false">Shoes</button>
          <button type="button" data-filter="electronics" aria-pressed="false">Electronics</button>
        </div>
      </div>
    </section>

    <section class="products-section container shop-products-section" aria-labelledby="shop-products-title">
      <div class="section-heading compact-heading shop-results-head">
        <div>
          <span class="section-kicker">Browse products</span>
          <h2 id="shop-products-title">Shop the latest picks</h2>
        </div>
        <p class="shop-results" id="resultsSummary" aria-live="polite"></p>
      </div>

      <div class="products-grid shop-product-grid" id="shopProductGrid"></div>
    </section>
  </main>

  <script src="admin/js/services/catalog.service.js"></script>
  <script src="js/products.js"></script>
  <script src="shop.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script src="js/search.js"></script>
  <script src="shared/storage.js"></script>
  <script src="js/header.js"></script>
</body>
</html>
